[tool_alias]
agent-browser = "npm:agent-browser"
ccusage = "npm:ccusage"
claude-code = "npm:@anthropic-ai/claude-code"
codex = "npm:@openai/codex"
ecspresso = "aqua:kayac/ecspresso"
jsonnet = "asdf:Banno/asdf-jsonnet"
lambroll = "aqua:fujiwara/lambroll"
opencommit = "npm:opencommit"
pinact = "aqua:suzuki-shunsuke/pinact"
viu = "cargo:viu"

[tools]
agent-browser = "latest"
awscli = "latest"
aws-vault = "latest"
bat = "latest"
duckdb = "latest"
buildpack = "latest"
bun = "latest"
ccusage = "latest"
# chezmoi = "latest"
claude-code = "latest"
codex = "latest"
delta = "latest"
deno = "latest"
duf = "latest"
ecspresso = "latest"
editorconfig-checker = "latest"
fd = "latest"
fzf = "latest"
gcloud = "latest"
ghq = "latest"
github-cli = "latest"
go = "latest"
gomigrate = "latest"
jq = "latest"
jsonnet = "latest"
lambroll = "latest"
mkcert = "latest"
node = ["20", "lts"]
opencommit = "latest"
php = ["8.2"]
pinact = "latest"
protoc = "latest"
python = ["3.12"]
#racket = "latest"
ripgrep = "latest"
#ruby = "2.3.8"
rust = "latest"
rye = "latest"
sqlite = "latest"
terraform = "latest"
uv = "latest"
viu = "latest"
yq = "latest"

[settings]
legacy_version_file = true
legacy_version_file_disable_tools = ["python"]

plugin_autoupdate_last_check_duration = "1 week"

verbose = false
asdf_compat = false
http_timeout = "30s"
jobs = 4
raw = false
yes = false
idiomatic_version_file_enable_tools = ["go"]
experimental = true

[settings.npm]
bun = true

[env]
MISE_FETCH_REMOTE_VERSIONS_TIMEOUT = "120 sec"

[tasks.claude_serena]
description = "Add Serena MCP to Claude Code"
run = "claude mcp add serena -- uvx --from git+https://github.com/oraios/serena serena start-mcp-server --context ide-assistant --project $(pwd)"

[tasks.serena_index]
description = "Serena activation & indexing project"
run = "uvx --from git+https://github.com/oraios/serena serena project index"
